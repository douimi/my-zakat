name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

# ---------------------------------------------------------------
# JOB 1: Run all tests (unit + E2E) before deploying
# ---------------------------------------------------------------
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      # Real PostgreSQL for backend tests
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: myzakat_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---- Backend unit tests ----
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install httpx

      - name: Run backend unit tests
        env:
          TESTING: "true"
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: "test-secret-key"
          STRIPE_SECRET_KEY: "sk_test_fake_key"
          STRIPE_PUBLISHABLE_KEY: "pk_test_fake_key"
        run: |
          cd backend
          python -m pytest tests/test_payments.py tests/test_donations.py -v --tb=short

      # ---- Frontend unit tests ----
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend unit tests
        run: |
          cd frontend
          npx vitest run src/utils/__tests__/donations.test.ts src/pages/__tests__/Donate.test.tsx --reporter=verbose

      - name: Build frontend
        run: |
          cd frontend
          npx vite build

  # ---------------------------------------------------------------
  # JOB 2: E2E tests with Playwright (on push to main only)
  # ---------------------------------------------------------------
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test  # Only run E2E if unit tests pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create test .env file
        run: |
          cat > .env <<EOF
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=password
          SECRET_KEY=ci-test-secret-key
          FRONTEND_URL=http://localhost:3000
          EOF

      - name: Start Docker stack
        run: |
          docker compose up -d --build
          echo "Waiting for services to be healthy..."
          sleep 20

          # Verify backend is responding
          for i in {1..10}; do
            if curl -sf http://localhost:8000/health; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... ($i/10)"
            sleep 5
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run E2E tests
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_BACKEND_URL: http://localhost:8000
        run: npx playwright test --reporter=list

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 7

      - name: Stop Docker stack
        if: always()
        run: docker compose down -v

  # ---------------------------------------------------------------
  # JOB 3: Deploy to VPS (only after all tests pass, only on main)
  # ---------------------------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 12m
          script: |
            set -e

            DEPLOY_DIR="/root/prod/my-zakat"
            COMPOSE_FILE="docker-compose.traefik.yml"
            ENV_FILE="env.production"

            echo "=== Deployment started at $(date) ==="

            cd "$DEPLOY_DIR"

            # Pull latest code
            echo "--- Pulling latest code from GitHub ---"
            git fetch origin main
            git reset --hard origin/main

            # Verify env.production exists
            if [ ! -f "$ENV_FILE" ]; then
              echo "ERROR: $ENV_FILE not found in $DEPLOY_DIR"
              exit 1
            fi

            # Ensure traefik network exists
            docker network create traefik-network 2>/dev/null || true
            mkdir -p letsencrypt

            # Build new images
            echo "--- Building Docker images ---"
            docker compose -f "$COMPOSE_FILE" --env-file "$ENV_FILE" build --no-cache frontend backend

            # Restart services
            echo "--- Restarting services ---"
            docker compose -f "$COMPOSE_FILE" --env-file "$ENV_FILE" up -d

            # Health check
            echo "--- Waiting for services to be healthy ---"
            sleep 15

            HEALTH=$(curl -sf http://localhost:8000/health || echo "FAILED")
            if echo "$HEALTH" | grep -q "healthy"; then
              echo "Backend health check: PASSED"
            else
              echo "WARNING: Backend health check returned: $HEALTH"
              docker compose -f "$COMPOSE_FILE" logs --tail=30 backend
            fi

            # Cleanup
            docker image prune -f
            docker compose -f "$COMPOSE_FILE" ps

            echo "=== Deployment completed at $(date) ==="

      - name: Notify deployment result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice::Deployment to production succeeded"
          else
            echo "::error::Deployment to production failed"
          fi
