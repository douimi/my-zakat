server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Collect logs from all Docker containers
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Use container name as label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      # Use compose service name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      # Use compose project name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'
      # Keep container ID for correlation
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
    pipeline_stages:
      # Try to detect log level from common patterns
      - regex:
          expression: '(?i)(?P<level>ERROR|WARN(?:ING)?|INFO|DEBUG|CRITICAL)'
      - labels:
          level:
      # Detect JSON-formatted logs from the backend
      - json:
          expressions:
            level: level
            msg: msg
            timestamp: timestamp
          source: output
      - labels:
          level:
