<!doctype html>
<html lang="en" prefix="og: https://ogp.me/ns#">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>MyZakat – Zakat Distribution Foundation | Donate, Calculate Zakat & Support Communities</title>
    <meta name="description" content="MyZakat is a nonprofit Zakat distribution foundation empowering communities through transparent Zakat, Sadaqa, and charitable giving. Calculate your Zakat, donate securely, and support families in need." />
    <meta name="keywords" content="Zakat, Sadaqa, Islamic charity, Zakat calculator, donate Zakat, Zakat distribution, nonprofit, charitable giving, Islamic donation, Kaffarah, Zakat Al-Fitr, community support, humanitarian aid, Muslim charity" />
    <meta name="author" content="MyZakat Zakat Distribution Foundation" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://myzakat.org/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MyZakat – Zakat Distribution Foundation" />
    <meta property="og:title" content="MyZakat – Zakat Distribution Foundation | Donate, Calculate Zakat & Support Communities" />
    <meta property="og:description" content="Empowering communities through transparent Zakat and Sadaqa distribution. Calculate your Zakat, donate securely online, and make a meaningful difference." />
    <meta property="og:url" content="https://myzakat.org/" />
    <meta property="og:image" content="https://myzakat.org/logo.png" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MyZakat – Zakat Distribution Foundation" />
    <meta name="twitter:description" content="Empowering communities through transparent Zakat and Sadaqa distribution. Calculate your Zakat, donate securely, and support families in need." />
    <meta name="twitter:image" content="https://myzakat.org/logo.png" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#047857" />

    <!-- DNS Prefetch and Preconnect for better performance -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Preload critical resources -->
    <link rel="preload" href="/logo.png" as="image" type="image/png">

    <!-- Fonts - Load asynchronously with font-display swap for better performance -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'; this.onload=null;">

    <!-- Preload critical CSS -->
    <link rel="preload" href="/src/index.css" as="style">

    <!-- Optimize for mobile -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <!-- Performance hints -->
    <meta http-equiv="x-dns-prefetch-control" content="on">

    <!-- GEO: Pointers for AI systems -->
    <link rel="author" href="https://myzakat.org/about" />
    <link rel="help" href="https://myzakat.org/contact" />
